name: Update Scholar Stats

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-crawler:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4 # 升级到 v4，消除黄色警告
    - name: Set up Python
      uses: actions/setup-python@v5 # 升级到 v5，消除黄色警告
      with:
        python-version: '3.9'
    
    - name: Install requirements
      run: pip install requests # 新脚本只需要 requests 库
    
    - name: Run lightweight crawler
      env:
        GOOGLE_SCHOLAR_ID: 5Rh3yn4AAAAJ
      run: python ./google_scholar_crawler/main.py
    
    - name: Save and Push results
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add results/*
        git commit -m "Auto-update Google Scholar stats" || exit 0
        git push